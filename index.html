<head><script id="early-device-detection">
(function () {
  var viewport = Math.min(
    window.innerWidth || 9999,
    document.documentElement.clientWidth || 9999,
    window.visualViewport ? window.visualViewport.width : 9999
  );

  var shortSide = Math.min(
    window.screen && window.screen.width
      ? window.screen.width
      : viewport,
    window.screen && window.screen.height
      ? window.screen.height
      : viewport
  );

  var touch =
    (navigator.maxTouchPoints || 0) > 0 ||
    (window.matchMedia &&
      window.matchMedia("(pointer: coarse)").matches);

  var device = "desktop";

  if (viewport <= 700 || shortSide <= 600) {
    device = "mobile";
  } else if (
    viewport <= 1100 ||
    shortSide <= 1100 ||
    (touch && viewport <= 1366)
  ) {
    device = "tablet";
  }

  document.documentElement.dataset.device = device;
})();
</script>
